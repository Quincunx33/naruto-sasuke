<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naruto vs Sasuke - Pro Edition</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --naruto-color: #ff9900;
      --sasuke-color: #9900ff;
    }
    body { margin: 0; overflow: hidden; background-color: black; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #v_src, #out {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1);
    }
    #out { z-index: 2; pointer-events: none; }
    .darkness {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.4);
      mix-blend-mode: multiply; pointer-events: none; z-index: 5;
      transition: background 0.5s;
    }
    .fx {
      position: absolute; height: auto; top: 0; left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none; display: none;
      mix-blend-mode: screen; z-index: 20;
      transition: opacity 0.3s, transform 0.1s ease-out;
    }
    #n { width: 1200px; }
    #s { width: 1800px; }
    
    /* UI Elements */
    #menu {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 100; text-align: center; color: white;
      background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px;
      border: 2px solid #ff9900; box-shadow: 0 0 20px #ff9900;
    }
    .btn {
      padding: 15px 30px; margin: 10px; font-size: 20px; cursor: pointer;
      border: none; border-radius: 10px; color: white; font-weight: bold;
      transition: 0.3s;
    }
    #btn-n { background: #ff6600; box-shadow: 0 0 10px #ff6600; }
    #btn-s { background: #6600ff; box-shadow: 0 0 10px #6600ff; }
    .btn:hover { transform: scale(1.1); }

    #overlay-fx {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 10; opacity: 0; transition: 0.5s;
    }
    .shake { animation: shake 0.2s infinite; }
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      40% { transform: translate(3px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      80% { transform: translate(3px, 1px) rotate(-1deg); }
      100% { transform: translate(1px, -2px) rotate(1deg); }
    }
  </style>
</head>
<body>

  <div id="menu">
    <h1>CHOOSE YOUR PATH</h1>
    <button id="btn-n" class="btn">NARUTO (Rasengan)</button>
    <button id="btn-s" class="btn">SASUKE (Chidori)</button>
    <p>Show your palm to activate power!</p>
  </div>

  <video id="v_src" autoplay playsinline></video>
  <canvas id="out"></canvas>
  <div id="overlay-fx"></div>
  <div class="darkness"></div>

  <video id="n" class="fx" src="assets/naruto.mp4" muted autoplay loop playsinline></video>
  <video id="s" class="fx" src="assets/sasuke.mp4" muted autoplay loop playsinline></video>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const vElement = document.getElementById('v_src');
    const cElement = document.getElementById('out');
    const ctx = cElement.getContext('2d');
    const n = document.getElementById('n');
    const s = document.getElementById('s');
    const menu = document.getElementById('menu');
    const overlay = document.getElementById('overlay-fx');

    // Audio Assets
    const bgm = new Audio('assets/naruto_bgm.mp3'); bgm.loop = true; bgm.volume = 0.3;
    const n_sfx = new Audio('assets/rasengan_sfx.mp3'); n_sfx.loop = true;
    const s_sfx = new Audio('assets/chidori_sfx.mp3'); s_sfx.loop = true;
    const n_voice = new Audio('assets/naruto_dialogue.wav');
    const s_voice = new Audio('assets/sasuke_dialogue.wav');

    let selectedChar = null;
    let pwr = [0, 0]; 
    let wasOpen = [false, false];
    let lastPos = [{x:0, y:0}, {x:0, y:0}];

    document.getElementById('btn-n').onclick = () => { selectedChar = 'naruto'; menu.style.display = 'none'; bgm.play(); };
    document.getElementById('btn-s').onclick = () => { selectedChar = 'sasuke'; menu.style.display = 'none'; bgm.play(); };

    function checkOpen(pts) {
        let count = 0;
        const wrist = pts[0];
        const tips = [8, 12, 16, 20];
        const pips = [6, 10, 14, 18];
        for (let i = 0; i < tips.length; i++) {
            const tip = pts[tips[i]];
            const pip = pts[pips[i]];
            if (Math.hypot(tip.x - wrist.x, tip.y - wrist.y) > Math.hypot(pip.x - wrist.x, pip.y - wrist.y)) count++;
        }
        return count >= 3;
    }

    function onResults(res) {
        cElement.width = vElement.videoWidth;
        cElement.height = vElement.videoHeight;
        ctx.save();
        ctx.clearRect(0, 0, cElement.width, cElement.height);

        let active = false;
        n.style.display = 'none';
        s.style.display = 'none';

        if (res.multiHandLandmarks && res.multiHandedness) {
            res.multiHandLandmarks.forEach((pts, i) => {
                const label = res.multiHandedness[i].label;
                const isR = label === 'Right';
                const idx = isR ? 1 : 0;

                // --- PREMIUM GLOW SKELETON ---
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = isR ? '#9900ff' : '#ff9900';
                drawConnectors(ctx, pts, HAND_CONNECTIONS, {color: isR ? '#9900ff' : '#ff9900', lineWidth: 4});
                drawLandmarks(ctx, pts, {color: '#ffffff', lineWidth: 1, radius: 3});
                ctx.restore();

                const open = checkOpen(pts);
                
                // Dynamic Scaling based on hand distance (z-axis approximation)
                const handSize = Math.hypot(pts[0].x - pts[9].x, pts[0].y - pts[9].y);
                const scaleFactor = handSize * 5; // Adjust multiplier for realism

                pwr[idx] += open ? 0.05 : -0.15;
                pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));

                if (open && !wasOpen[idx]) {
                    if (selectedChar === 'naruto' && !isR) { n_voice.play(); n_sfx.play(); }
                    if (selectedChar === 'sasuke' && isR) { s_voice.play(); s_sfx.play(); }
                }
                if (!open && wasOpen[idx]) {
                    n_sfx.pause(); s_sfx.pause();
                }
                wasOpen[idx] = open;

                const wrist = pts[0];
                const knk = pts[9];

                if (pwr[idx] > 0.01) {
                    active = true;
                    if (isR && selectedChar === 'sasuke') { 
                        const tx = (wrist.x + knk.x) / 2;
                        const ty = (wrist.y + knk.y) / 2;
                        s.style.left = `${(1 - tx) * window.innerWidth}px`;
                        s.style.top = `${ty * window.innerHeight}px`;
                        s.style.display = 'block';
                        s.style.opacity = pwr[idx];
                        s.style.transform = `translate(-50%, -50%) scale(${scaleFactor})`;
                        overlay.style.background = 'radial-gradient(circle, rgba(153,0,255,0.2) 0%, transparent 70%)';
                        overlay.style.opacity = pwr[idx];
                        document.body.classList.add('shake');
                    } else if (!isR && selectedChar === 'naruto') { 
                        const dx = knk.x - wrist.x;
                        const dy = knk.y - wrist.y;
                        const tx = knk.x + (dx * 0.8);
                        const ty = knk.y + (dy * 0.8);
                        n.style.left = `${(1 - tx) * window.innerWidth}px`;
                        n.style.top = `${(ty * window.innerHeight) - 120}px`;
                        n.style.display = 'block';
                        n.style.opacity = pwr[idx];
                        n.style.transform = `translate(-50%, -50%) scale(${scaleFactor})`;
                        overlay.style.background = 'radial-gradient(circle, rgba(255,153,0,0.2) 0%, transparent 70%)';
                        overlay.style.opacity = pwr[idx];
                        document.body.classList.add('shake');
                    }
                }
            });
        }

        if (!active) {
            document.body.classList.remove('shake');
            overlay.style.opacity = 0;
            n_sfx.pause(); s_sfx.pause();
        }
        ctx.restore();
    }

    const h = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    h.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    h.onResults(onResults);

    const cam = new Camera(vElement, {
        onFrame: async () => { await h.send({ image: vElement }); },
        width: 1280, height: 720
    });
    cam.start();
  </script>
</body>
</html>
